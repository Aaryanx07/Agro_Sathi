<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #F9F6EF;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #2E7D32;
            margin-bottom: 30px;
        }

        .lang-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #C8E6C9;
            background: white;
            font-size: 16px;
            cursor: pointer;
        }

        .lang-btn:hover {
            background: #E8F5E9;
        }

        .continue-btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Select Language</h2>

    <form action="/login" method="post">
    <select name="lang" required class="lang-btn">
        <option value="">Select Language</option>
        <option value="en">English</option>
        <option value="hi">हिंदी</option>
    </select>

    <button type="submit" class="continue-btn">Continue</button>
</form>
</div>

</body>
</html>
